name: Bug report
description: Report a problem with Axiom Test Runner
labels: ["bug"]
body:

  - type: textarea
    id: issue
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        Ideally, include a minimal Go file that shows the problem.
        See `src/test/testData/axiom/*` for example fixtures.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Grab the IDE log via **Help → Show Log in Finder/Explorer** and
        paste any lines that mention `axiom` or `GoTestConfigurator`.

        *Automatically formatted — no need for backticks.*
      render: shell

  - type: input
    id: plugin-version
    attributes:
      label: Axiom Test Runner version
      placeholder: 1.0.0
    validations:
      required: true

  - type: input
    id: ide
    attributes:
      label: IDE and version
      placeholder: GoLand 2024.3.2 (Build #GO-243.21565.208)
    validations:
      required: true

  - type: input
    id: axiom-version
    attributes:
      label: Axiom framework version
      placeholder: v1.6.0

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
